name: Release CLI

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish CLI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Show tool versions
        run: |
          node --version
          npm --version
          pnpm --version

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

      - run: pnpm run typecheck

      - run: pnpm test

      - run: pnpm --filter @yunyoujun/workstation build

      - name: Check tag matches CLI package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag version v${tag_version} does not match CLI package version ${package_version}"
            exit 1
          fi

      - name: Check package contents
        working-directory: packages/cli
        run: npm pack --dry-run

      - name: Publish CLI to npm
        working-directory: packages/cli
        run: npm publish --access public

      - name: Create GitHub release
        run: pnpm exec changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
